body:
  text: 周禮復古編禮類一周禮之屬提要臣等謹案周禮復古編一卷宋俞庭椿撰庭椿字夀翁臨川人乾通八年進士官古田令是書宋志作三卷今本作一卷標曰陳友仁編蓋友仁訂正周禮集說而以此書附其後也庭椿之說謂五官所屬皆六十不得有羡其羡者皆取以補冬官鑿空臆斷其謬妄殆不足辨又謂天官世婦與春官世婦夏官環人與秋官環人為一官復出當省并之其說似巧而其謬尤甚二世婦與二環人無論職掌各殊即以序官考之天官世婦為王之後宫故與九嬪八十一御女皆無官屬至於春官世婦為王之宫官故每官卿一人下大夫四人中士八人女府二人女史二人奚十六人與天官世婦顯異鄭注以漠之大長秋詹事中少府太僕為證其說本確庭椿乃合而一之是誤以春官之世婦為婦人也至于司馬之環人掌下士六人史二人徒十有二人秋官之環人掌中士四人史四人胥四人徒四十人若二環人是一官何所屬之中下士及史胥徒乃各不同如此耶此好立異說者之適以自蔽也然復古之說始于庭椿厥後邱葵吳澄皆襲其繆說周禮者遂有冬官不亡之一派分門别戶輾轉蔓延其弊至明末而未已故特存其書著竄亂聖經之始為學者之炯戒焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6cee8e747c625d86a414a2d1c327e8e1b9612b54269138881e50b6f77099fb50
