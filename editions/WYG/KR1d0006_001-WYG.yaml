body:
  text: 周禮復古編宋俞庭椿撰六經厄秦至漢稍稍得復然而多出於儒者記誦傳授之學不能無譌誤既成篇袠相傳至今世儒信其師承之或有所自也無或疑議遂使聖經之舊泯焉不可復見周禮一書皆周之舊典禮經然方諸侯惡其害已而去班爵禄之籍已有亡失之漸況一燔於煨燼而僅僅出於口傳追記之餘安能盡復其故耶伏生年過九十口授尚書自非孔壁所藏古文出而考證則舜典與堯典孰分益稷與臯陶謨奚别盤庚不得而異篇康王之誥不得而殊體信以傳信未必不至于今日也六經惟詩失其六書逸其半周禮司空之篇有可得言者反覆之經質之於書驗之於王制皆有可以是正焉者而司空之篇實雜出於五官之屬且因司空之復而六官之譌誤亦遂可以類考將一一摘其要者議之誠有犂然當於人心者葢不啻寳玉大弓之得而鄆讙龜陰之歸也雖然由漢迄今世代逺邈大儒碩學項背相望而區區末學乃爾起義是不得罪於名教者㡬希嗚呼學者寧信漢儒而不復考之經耶無寧觀其說而公其是非以旁證於聖人之言而幸復於聖經之故耶知我罪我所弗敢知此復古編之所為作也六官上古帝王之建官也法天地四時以為名名舉其官官治其事無有廢曠不舉之處誠以名正而言順言順而事成也故黄帝氏以雲紀炎帝以火紀共工以水紀太皡氏以龍紀少皡氏以鳳鳥適至因紀於鳥曰祝鳩氏司徒也曰雎鳩氏司馬也曰鳲鳩氏司空也曰爽鳩氏司冦也祝鳩鷦鳩也能孝故司徒以教民雎鳩王雎也鷙而有别故司馬主法制鳲鳩鴶鵴也以其平均故司空主平水土爽鳩鷹也鷙故司冦主治盜賊此皆建官之本意而自顓帝以來始為民師而命以民事於是六官之名立六官之事治舜命九官而禹作司空實平水土契作司徒敬敷五教伯作秩宗命典三禮臯陶為士惟明五刑其餘則皆有職此虞舜稽古建官之目夏商因之至於四官者居六官之四而他五官若虞若工若樂若后稷若納言皆不專屬而隸于六官之一者葢周制也周自成王歸于豐作周官自三公三孤而下六卿分職各率其屬若冢宰則掌邦治統百官均四海司徒則掌邦教敷五典擾兆民宗伯則掌邦禮治神人和上下司馬則掌邦政統六師平邦國司冦則掌邦禁詰姦慝刑暴亂司空則掌邦土居四民時地利此周禮六官之大凡即是以考則其所隸可得而推矣秦燔詩書禮經尤被其毒漢興傳禮者有魯高堂生魯徐生徐生獨善為頌不能通經傳子至孫皆以頌為禮官大夫瑕丘蕭奮以禮至淮陽太守東海人孟卿事奮以授后倉倉說禮數萬言號曰后氏曲臺記梁又有戴徳戴聖等學於是禮有大戴小戴漢興禮學於亡逸者僅僅如此而今周禮所傳授尚未聞其端班固曰孔子綴周之禮此禮所以必取於周以為經者也藝文志曰周官經六篇周官傳四篇注言王莽時劉歆置博士顔師古曰亡其冬官以考工記充之至後漢時河南緱氏杜子春之徒稍相講授然今六官大抵皆紊亂統紀非先秦之舊若制國用冢宰之職也而後世雜之司徒度地居民興事任力司空之事也而後世雜之司徒此葢明白易見可以考證者習其讀而安之亦以其傳譌之久故也司徒氏掌教者也而財賦則兼之土地之事則隸之無亦以其為地官故凡土地之事悉以屬焉而財貨出於土地者也亦從而屬之名與事違官與職戾書得於傳流之久事習於譌舛之餘習者不察而事益以乖國用制於冢宰邦土掌於司空皆有明證不誣而後世實淆亂其制甚矣傳譌之移人也質之以經將有所是正焉官正而司空之篇可得而復其所謂丘夷而淵實者耶冢宰冢宰為六卿之長曰掌邦治統百官均四海者其凡也治者無不該也國之務聴焉而六官之所掌皆屬若六典八法八則八柄皆所以統百官也八統九職九賦九式九貢九兩皆所以治財賦均四海也國之治無此為大者冢宰實總之故其屬曰小宰曰宰夫者以治官府曰大府曰玉府曰内府曰外府曰職内曰職嵗職幣者以治財賦至於宫禁及閽寺之事膳饔醫藥之繁亦兼掌之或以為冢宰非所當治是不然葢飲食服御皆王之朝夕從事焉者使供之非其正用之非其宜則甚不可故必以六官之長掌之重其事也大要正百官制財用者實佐王治邦國之綱目故王制言冢宰之職不過曰制國用而言制國用之詳如曰必於嵗之杪又曰以三十年之通制國用量入以為出其說甚詳則冢宰主於治財賦何疑專以司徒為治財賦之官失古者設官之本意請遂論之司徒舜命契曰汝作司徒敬敷五教在寛孟子亦曰使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信王制曰司徒修六禮以節民性明七教以興民徳齊八政以防淫一道徳以同俗穆王命君牙為司徒亦曰𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中周官曰司徒掌邦教敷五典擾兆民若是者悉矣未聞以司徒治財賦任土地者也古者重於教民凡所以維持之甚詳而所以訓導之甚至然後民知有君臣知有父子知有兄弟夫婦朋友相事相使相安相養相愛而無争悖之風趨仁而遷義尊君而親上熈熈然日入於太和之域而不自知者以有司徒之教存也今司徒之屬如卿大夫州長黨正族師閭胥比長與夫師氏保氏司諫司救調人等官無非古者教民之良法美意是故不當以司徒治財賦今其為財賦之官者不過泉府司市質人㕓人胥師之屬耳葢教民之為善者莫切於財利相交之際是必有以禁其非而導之義者故司徒兼焉非以司徒治財賦也後世惑於泉府司市之屬在司徒遂以司徒為財賦之任又以其為地官也宜掌土地之事遂以司空之屬附益之司徒之教職乃遂為不切不急之務而專於財賦土地之為職斯民於是始無有導之於道徳性命之理而易與為非矣然則司徒之職其可以不講其所掌之本務乎宗伯昔者聖人之治天下也必修禮明樂以導之其條章節目器用度數莫不有法故設官以掌其事舜之命官典禮與樂各惟其人至周官定制以六官為之長而率其屬於是有不能盡該而别分者遂兼命焉宗伯掌禮而司樂實隸之夫樂之兼隸固也而鼓人舞師今繫之司徒何耶豈以司徒之教民必以禮樂故耶今司樂樂師大胥大師之屬何為而不屬之以周之設官固不專屬自有互相為用者不必泥其制然若是則周之設官其序固無統紀其官固無定屬亦何取乎分職之義歟夫鍾師磬師笙師鎛師之與鼓人無異也韎師籥師之與舞師無異也何鼓人舞師獨宜於司徒而他莫屬焉無乃二者之屬於司徒者傳譌之驗歟不特此也司儀之於司冦何所附麗大行人小行人皆所以掌賔客之禮與行夫掌客掌訝掌交皆非於刑罰盜賊之事有相闗焉者而今皆為司冦之屬是則有不必辨而可知其非者決矣由漢以來惑於傳授未有嘗置疑於其間者是可嘆也於是槩見其凡而其詳則别言之于後司馬國有六職大司馬掌邦政統六師以佐王平邦國四時教民以軍旅坐作進退之事寓之于蒐田於是有九伐之法以正諸侯之不正若環人司右虎賁旅賁之屬以治軍旅趣馬圉師校人之屬以修馬政司兵司甲之屬以除戎器皆司馬主兵之類也而職方氏土方氏懷方氏形方氏與夫川師邍師之屬胡為而在其列也說者以謂司馬掌建邦國之九法是宜屬曰不然六官之職固有互相參掌者而其大綱則一定而不易司馬之九法特兼言九法之大凡而事之所掌則各從其屬職方氏掌天下之圖以掌天下之地此邦土之任司空氏之職也後漢大司空上輿地圖此其遺制尚有存者夫辨其國都四夷八蠻七閩九貉五戎六狄之人民與其財用九穀六畜之數以周知其利害葢司空以是居民以是時其地利以是使中國夷蠻各有安居和味異宜利用備器如王制言中國戎夷五方之民之類也司馬胡為而職之若職方以土地之事而班之於司馬則六官不必分職而司空不必設矣舜命禹以司空使平水土其舉職任事無大於任土作貢之功今禹貢一書葢司空職事書也周之職方實所取法則職方之為司空屬復何疑者書出於亡逸漢儒傳授而信遂安其習以至于今司空之篇闕焉然則非司空之篇亡人實亡之也嗚呼亦知夫職方之不當屬司馬也而後司空之篇可得而復矣釋職方氏掌天下之圖者曰如今司空輿地圖吁盍亦反而思之司冦六官之各有其職質之於書稽之於王制考之於冢宰小宰六典六屬六職之目井然而不紊今周禮所存六官往往多雜治而不專一豈聖人設官固若是其無統歟愚請以大司冦小司冦之職驗雜治者之非聖經之舊也今觀大司冦之一篇自掌邦之三典而下凡十有三章無非刑獄之條未嘗有一語雜及它職事者小司冦亦然然則聖人設官固專一不雜如此若司徒之治財賦任土事司馬之兼職方非聖經之舊也至於司儀行人之非不待辨而白矣司空司空之篇為逸書漢人以考工記附益之相傳之久習以為然雖有鉅儒碩學不復致思研慮後世遂以考工之事為六官之一司空所掌日漸譌誤併與其官廢葢嘗紬繹是書伏而讀之司空之篇實未嘗盡亡也六官之屬誠有顛錯雜亂而未盡正者編次而辨正之庶幾西周之盛可尋而六官之掌各得其所復其舊而摘其譌使萬世恨遺逸而不可考者一旦稍復其故則亦於聖經萬一有補焉司空古官也舜以水土命禹而共工則咨垂然則司空之官實重而百工之事無與焉周官之書曰掌邦土居四民時地利大宰之職六曰事典以富邦國以任百官以生萬民小宰之六職六曰事職以富邦國以養萬民以生百物禮經王制則尤詳焉曰司空執度度地居民山川沮澤時四時量地逺近興事任力凡使民任老者之事食壯者之食凡居民材必因天地寒煖燥濕廣谷大川異制民生其間者異俗又曰凡居民量地以制邑度地以居民地邑民居必參相得也無曠土無游民食節事時民咸安其居樂事勸功尊君親上然後興學凡此皆著見於經粲然可據者也後人徒以司徒之為地官土地之事地官之類也故司空之屬皆汨乎其中葢自大司徒之職已皆譌誤大半皆司空事也嗚呼以司徒地官而宜任土地之事則天官所掌亦皆天象星辰之職如羲和之類矣然則司空之篇其不亡矣夫五官之屬不宜有羨周建官三百六十未聞有溢員也小宰以官府之六屬舉邦治皆曰其屬六十大事則從其長小事則專達則六十之外皆羨矣周禮得於秦火之後官宜少不宜羨今五官之羨者四十有二而其六十員之中又未必盡其官屬乃司空之屬俱亡今取其羨與其不宜屬者而考之葢司空之篇可得而考焉今天官之羨者九地官之羨者十有六春官之羨者九夏官之羨者九秋官之羨者五從其羨而求之冬官皆不亡矣考之於事而可證驗之於數而可數學者習其讀而未之思焉不然則五官之羨也何說司空役民古之王者重於使民必有官以專其事葢重之也而力役今皆隸于司徒如地職地守地貢地征之類是也凡此者皆譌誤何以言之王制言司空凡使民任老者之事食壯者之食又曰無曠土無㳺民此力役地征與夫任民者之職也然則經何以言之曰質之經而可知也鄉師之職曰大役則帥民徒而至治其政令既役則受州里之役要以攷司空之辟以逆其役事由是觀之則司空之掌役事有明證矣又司冦之職亦曰凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空則司空之役民非臆說也復稽之以王制是益無可疑者而今習焉以司徒掌土地之事凡地職地守地征地貢皆遂以其為司徒職也傍考之經愚得以為據依焉然則凡力役地征一皆歸之於司空然後可以復經之舊九職天官以九職任萬民一曰三農生九榖二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰間民無常職轉移執事此雖載在天官其實則司空事也任者事也所以任其力也曰農曰圃曰虞曰藪曰工曰商曰嬪曰臣妾曰間民九者民之各有其職者也王制所謂使民興事任力無曠土無㳺民食節事時樂事勸功者此皆其凡也天官無所不當問故兼治之惟司空實掌之惟其掌之也然後各得其所而無失職之民則農之生九榖圃之毓草木虞之作山澤之材藪之養蕃鳥獸工之飭化八材商之阜通貨賄嬪之化治絲枲與夫臣妾之疏材間民之執事皆具於司空之職後人以考工附之者其源流葢起於是是則百工者特司空九職之一而以該冬官之所掌可見其非是矣後之欲考司空之職者當以天官九職為據世婦天官春官皆有世婦或曰職異嫌同名曰不然考其所掌則在天官者曰帥女宫而濯溉為齍盛及祭之日涖陳女宫之具在春官者則曰掌女宫之宿戒及祭祀比其具則其所掌皆女宫祭祀之事也同所掌而同所名一在天官一在春官將何以為别也若行人而别之以大小若司馬而異之以都家如此類者是則有别矣今世婦同所掌而無異事同其名而無異别葢有以知其重複之為譌也何也在天官甚略在春官者則詳在天官者曰掌祭祀賔客之事帥女宫而濯溉為齍盛而賔客之掌則闕焉至春官之世婦乃曰大賔客而饗食亦如之葢與前文相應傳者譌離而為二耳取而比之若合符節嗚呼知世婦複出之為譌也而後足以知六官之屬其顛倒誤亂者多良可信也環人兩環人亦離而二之者也司馬之環人掌致師司冦之環人掌送逆邦國之通賔客二者異職今以為離而二之何也曰三百六十官不宜有重名而復出者環之字同也釋於司馬者曰環猶卻也釋於司冦者曰環猶圍也環一也而在彼者彼義在此者此義何所據而云也在司馬者有師旅之事則附之以卻之名在司冦者有令環之之語則因之以圍之說皆惑也按簭人九曰巫環巫簭者也以簭環知吉凶也孟子三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣環居九筮之一葢筮之名也故曰辨九簭之名釋九簭者曰簭環簭致師也此葢本於司馬之環人而言不然也環自簭名之一耳故孟子曰環而攻之必有得天時者矣今人釋孟子者未有得其說者也則曰圍而攻之夫圍而攻之遽曰得天時絶無意義孟子此章不可得通葢環者筮而用之軍師之名也環而攻之者筮而行也攻之則筮吉故曰必有得天時者矣故環人掌致師致師者賈勇而致敵非得吉卜不可也曰察軍慝環四方之故釋者曰卻其以事謀來侵伐者若如注釋即環四方之故一語絶不可解葢筮其故云爾巡邦國搏諜賊訟敵國揚軍旅降圍邑皆筮而知其吉凶以決疑然後行也至於司冦之環人曰掌送逆邦國之通賔客以路節達諸四方舍則授館令聚􅈀有任器則令環之凡門闗無㡬送逆及疆古者邦國之賔客在國葢有叵測者楚人之衷甲荀息之假道若此之類誠非小故也使不有以占其吉凶而為之備則非古人備具不虞之意故聚􅈀令環皆以警備之也然則其於司馬之環人之職非有異矣且司馬之環人曰察軍慝曰搏諜賊此其施之軍興之日而聚􅈀令環以警賔客之在國則其無事而不忘備也或曰古之聖人其設官分職而屑屑於卜筮以信其吉凶非聖人之事也曰不然洪範九疇次七曰明用稽疑立之人而命之卜筮凡卜筮必其龜從筮從而卿士庶民次之至于龜筮共違于人則静吉而作凶孰謂聖人而不屑於卜筮耶軍旅賔客之事其可忽諸故以兩環人之職合而觀之葢一事耳司馬之環人至降圍邑而止葢未成章也以司冦之環人足之章始成況釋環以二義前曰卻後曰圍勉强而不可通以環為卻曰卻四方之故可乎以環為圍曰賔客有任器則令圍之可乎賔客未有它故而遽圍之亦非所以待賔客之禮矣故兩環人當合而為一官然後可嗚呼欲正周官之譌者當以是觀之天官之屬大宰小宰宰夫宫正宫伯膳夫庖人内饔外饔亨人甸師獸人􅈄人鼈人腊人醫師食醫疾醫􅅑醫獸醫酒正酒人漿人凌人籩人醢人醯人鹽人羃人宫人掌舍幕人掌次玉府大府内府外府司㑹司書職内職嵗職幣司裘掌皮内宰内小臣閽人寺人内奄九嬪世婦女御女祝女史典婦功典絲典枲内司服縫人染人追師屨人夏采凡六十有三今編獸人􅈄人鼈人獸醫右冬官之屬也後人因膳夫庖人之屬遂置之天官非也天官掌供王之膳羞固也而獸人􅈄人鼈人則非所掌至於獸人附列於醫師此尤不可者按月令季春之月命司空曰田獵罝罘羅罔畢翳餧獸之藥毋出九門用是以知此四官屬司空無疑也葢九職三曰虞衡作山澤之材四曰藪牧養蕃鳥獸乃司空之職則獸人獸醫􅈄人鼈人不為天官屬亦明矣月令雖非必聖人之書或出於秦亦去古未逺有古之遺事焉司裘染人追師屨人掌皮典絲典枲右冬官之屬也司空掌百工凡此四者工人之官所以供王之服御而掌皮典絲典枲則備工之用而典治絲枲飭化八材屬之司空曰宜官凡十一宜在司空今存者六十有三三為羨去十有一焉於是闕其八矣八者雜之春官見于後地官之屬大司徒小司徒鄉師鄉老鄉大夫州長黨正族師閭胥比長封人鼓人舞師牧人牛人充人載師閭師縣師遺人均人師氏保氏司諫司救調人媒氏司市質人㕓人胥師賈師司虣司稽肆長泉府司門司闗掌節遂人遂師遂大夫縣正鄙師鄼長里宰鄰長旅師稍人委人土均草人稻人土訓誦訓山虞林衡川衡澤虞迹人卝人角人羽人掌葛掌染草掌炭掌荼掌蜃囿人場人廩人舍人倉人司禄司稼舂人饎人稾人凡七十八今編鼓人舞師右春官之屬也論見前編封人載師閭師縣師均人遂人遂師遂大夫土均草人稻人土訓山虞林衡川衡澤虞卝人角人羽人掌葛掌染草囿人場人右冬官之屬也司空掌邦土居四民時地利則凡邦之土事與夫地利之宜實職之王制言執度度地量地制邑地邑民居必參相得皆其義也封人之封國造邑載師之任地定征閭師之任民縣師之制域均人之均力政遂人之遂田野治溝洫遂師之徵財征作役事遂大夫之修稼政屬地治土均之平地政均地守均地事均地貢草人掌土化之法稻人掌水利之事土訓之道地圖以掌地事是皆度地制邑居民而時其地利者以類推之是當屬之司空而大司徒之教民於此宜無與焉以至山虞澤虞林衡川衡之掌山澤卝人角人羽人之蓄山澤之材囿人之牧獸場人之植菓蓏掌葛掌染草之時地利其稽之於書考之於禮經質之於六典六職證之於十有七官之羨則取而隸之司空是則有據而非臆說以求為異論者也夫司徒以地名官後之人不復夷考其義姑以其名近而取類焉故司空水土之官雜入為多今區而别之可以槩見矣春官之屬大宗伯小宗伯肆師鬱人鬯人雞人司尊彞司几筵天府典瑞典命司服典祀守祧世婦内宗外宗冢人墓大夫職喪大司樂樂師大胥小胥大師小師瞽矇眡瞭典同磬師鍾師笙師鎛師韎師旄人籥師鞮鞻氏典庸器司干大卜卜師卜人龜人菙氏占人簭人占夢眡祲大祝小祝喪祝甸祝詛祝司巫男巫女巫大史小史馮相氏保章氏内史外史御史巾車典路車僕司常都宗人家宗人凡七十今編天府世婦内宗外宗大史小史内史外史御史右天官之屬也天府掌祖廟之守藏凡國之玉鎮大寳器藏焉其與諸府皆宜在天官況於藏官府鄉州及都鄙之治中以詔王察羣吏之治此皆冢宰之事非宗伯所宜職者故是官宜在天官若世婦為重出則既論矣内宗外宗掌佐王后宗廟之祭祀葢婦官也當與世婦及女御女祝之屬天官與宫正宫伯皆類也不當在宗伯至於大史掌建邦之六典以逆邦國之治掌法以逆官府之治掌則以逆都鄙之治皆大宰之職焉小史掌邦國之志宜以類從内史掌八枋之法以詔王治外史掌書外令御史掌邦國都鄙及萬民之治令以贊冢宰皆與大宰所掌相闗非宗伯所得兼也大宰之官六十有三其羨者三宜去者八若世婦則複出合之則一矣今宗伯之不當屬者九世婦之外則八焉以之足天官之屬學者較彼此而考之當自喻矣典瑞典同巾車司常冢人墓大夫右司空之屬也何以言之百工之官隸司空者也若典瑞與典同巾車與夫司常皆治其器物以備其用者也治其器物以備用則是工之屬其隸司空為宜典瑞者大槩與考工玉人之事相若如四圭有邸兩圭有邸祼圭有瓚又曰璧羨以起度皆王之制也工在其間矣典同者掌六律六同之和辨天地四方陰陽之聲以為樂器以十二律為之數度以十二聲為齊量此制樂器之工也巾車掌公車之政令如曰王后之五路重翟錫面朱總厭翟勒而繢總安車彫面鷖總皆有容葢翟車貝面組總有握夫曰錫面曰勒面曰彫面曰貝面曰朱曰繢曰鷖曰組皆所以飾之者也即造車之制備矣至於司常掌九旗之物名各有屬以待國事如日月為常交龍為旂通帛為旃雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌是九旗之制備矣又曰皆畫其象焉官府各象其事州里各象其名家各象其號葢使之如其制以為此旗云爾是豈非工人之事而隸於司空者耶成周建官限於三百六十其不以一工人專一官明矣凡其器物須工為之而官掌之即百工之事在其間矣如典瑞典同之類是也必以一工為一官如今考工所載則司空者乃一大匠梓人之類耳何以為司空若夫攻木攻金攻皮設色刮摩摶埴之類皆得命而充職者將不勝其繁亦非聖人設官之意而周之冘食者多矣後世傳習之謬謂司空之官主百工而百工與居六職之一周官之在者乏工人之事也故斷以謂司空之篇俱亡亦不復加考正於其中嗟夫此司空之篇所以亡而由漢以來莫之察者失於不思聖人設官之意歟至於冢人墓大夫則宜以土事屬者也列之禮官濫矣夏官之屬大司馬小司馬軍司馬輿司馬行司馬司勲馬質量人小子羊人司爟掌固司險掌彊候人環人挈壺氏射人服不氏射鳥氏羅氏掌畜司士諸子司右虎賁氏節服氏方相氏大僕小臣祭僕御僕隸僕弁師司甲司兵司戈盾司弓矢繕人稾人戎右齊右道右大馭戎僕齊僕道僕田僕馭夫校人趣馬巫馬牧師庾人圉師職方氏土方氏懷方氏合方氏訓方氏形方氏山師川師邍師匡人撢人都司馬家司馬凡六十九今編弁師司弓矢稾人右司空之屬各以其工者也弁師不當在司馬已無可疑者葢為冕弁以供王之服用者也司弓矢乃考工弓人為弓之事故合九合七皆有其制稾人掌獻素獻成宜以工屬司空愈益明白謂其為兵而隸於司馬傳譌者也職方氏土方氏形方氏山師川師邍師右司空之屬也職方宜屬司空既於司馬篇論之矣土方氏形方氏宜以類從山師川師邍師皆是也山虞澤虞林衡即其僚耳故不多論秋官之屬大司冦小司冦士師鄉士遂士縣士方士訝士朝士司民司刑司刺司約司盟職金司厲犬人司圜掌囚掌戮司隸罪隸蠻隸閩隸夷隸貉隸布憲禁殺戮禁暴氏野廬氏蜡氏雍氏萍氏司寤氏司烜氏條狼氏修閭氏㝠氏庶氏宂氏翨氏柞氏薙氏硩蔟氏翦氏赤犮氏蟈氏壺涿氏庭氏銜枚氏伊耆氏大行人小行人司儀行夫環人象胥掌客掌訝掌交掌察掌貨賄朝大夫都則都士家士凡六十六大行人小行人司儀行夫掌客掌訝掌交環人前有論右春官之屬也孔子曰行人子羽修飾之左氏曰行人子羽行人葢言語之官所以掌大賔之禮大客之事其為禮儀之官明矣而與其徒司儀行人掌客掌訝掌交等俱列之司冦何義禮儀一事也豈以司儀名官不在禮職而在刑屬斷可識矣是當歸之宗伯何疑之有大司空小司空雜出於别官大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國大司徒掌邦教者也掌邦教然後能佐王以安擾邦國擾者教而馴之如擾龍之義也教然後安擾豈土地之圖人民之數遂能安擾之耶六典曰二曰教典以安邦國以教官府以擾萬民所謂教者如保息六養萬民本俗六安萬民使之相保相受相𦵏相救相賙相賔之類是也何取於土地之圖人民之數曰掌建邦國之土地之圖與其人民之數此大司空掌邦土以掌凡邦之役事之事也葢錯亂司空之篇於其首其非司徒之職事明矣以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物而辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野土地之圖釋之曰若今司空郡國輿地圖此惑於傳譌而不知思焉者也抑不思當時司徒所以為職者既如此而司空掌土地之圖何事於此而詳考焉則司空之篇不待於列千金以求之亦自明矣缺曰司空篇亡漢興以千金求之不得若以此論則傳授之誤似不必責鄭司農貫通博學猶不能思索於此漢儒信於師傳之故耳孟子曰盡信書不如無書武成之事孟子去古未逺已不敢信周禮經秦火之後復出於諸儒之口傳其當熟復詳考不宜盡信也決矣司空以水土之官辨山林川澤丘陵墳衍原隰之名物制畿疆而溝封此其為職截然可見屬之司徒無可附麗學者當勉思而明辨也以土㑹之法辨五地之物生一曰山林其動物宜毛物其植物宜阜物其民毛而方二曰川澤其動物宜鱗物其植物宜膏物其民黑而津三曰丘陵其動物宜羽物其植物宜覈物其民專而長四曰墳衍其動物宜介物其植物宜莢物其民晳而瘠五曰原隰其動物宜臝物其植物宜叢物其民豐肉而痺土㑹之法正司空度地以居民者也王制曰凡居民材必因天地寒煖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜此辨山林川澤丘陵墳衍原隰之名物而制其畿疆之節目也非司徒之任矣今雜之司徒也下章乃曰因此五物者民之常而施十有二教焉觀十二教之施不繫於五物其曰因此五物者民之常五物者非民之常乃物生之異耳故知此一句羨文也後人以上下文不相闗故强足之至於十有二教自司徒之職文失序也以土宜之法辨十有二土之名物以相民宅而知其利害以阜人民以蕃鳥獸以毓草木以任土事辨十有二壤之物而知其種以教稼穡樹藝土宜之法所以相民宅阜人民蕃鳥獸毓草木任土事教稼穡樹藝此與九職之事相屬曰相民宅乃居民山川沮澤者也曰蕃鳥獸曰毓草木曰任土事曰教稼穡樹藝乃居四民時地利者也時地利者司空之職故教稼穡樹藝等事皆以類屬若司徒之教民乃敷五典修六禮明七教齊八政云爾何以稼穡土事為也土宜之法是當屬之大司空以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政土均之法制地征作民職令地貢斂財賦齊天下之政皆司空使民興事任力者也力役之屬司空已有缺職實司空之事亦詳言之矣則地征之制民職之作與令貢而斂財司徒掌之則為侵官矣故土㑹土宜土均土圭皆土事非掌邦土者誰宜與於此以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多陰日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也陰陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮匠人建國匠人營國載之考工雖成周之舊亦其遺制也置槷為規皆以測景正朝夕其與土圭之法相表裏矣而土圭之法乃在司徒之職於建邦造都非類也與舜命官之意戾矣是不惟戾於有虞氏之官制也與大宰之六典小宰之六職皆相扞格豈以成周設官俱無特操如此耶司空執度度地量地制邑於王制可以知其職匠人建國匠人營國於考工可以遡其舊也若以司徒考之此皆强附而曲取於經於傳誠無以為據依也大槩司徒以地名官而司空之名則習以為百工之官而凡曰土地之事於是悉歸地官焉故其屬與其職悉雜司空之篇而司空之篇既出於誦說之譌附於彼則闕於此至盡亡其官與其屬今取大司徒之不應職者歸之司空而司空之屬豈不昭然如故物之復其主耶故曰司空之篇未嘗亡也釋造都鄙制地域者曰王制曰凡居民量地以制邑度地以居民地邑民居必參相得援引是已惜乎習矣而不察也乃分地職奠地守制地貢而頒職事焉以為地法而待政令力役之任屬在司空無疑矣則夫地職地守地貢皆力役之所當均焉者也故取而歸之司空嗚呼如知禹之所以為司空之義則地職地守地貢可以槩見矣大司馬之職曰乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿是職方之九服也其曰乃以九畿之籍施邦國之政職者羨文也後人以其麗司馬不得不以施邦國之為言也職缺政職所供王政之職缺益見其缺矣缺為職方九服之制也故曰職方千里曰國畿知職方之宜在司空則此章不在司馬矣又曰凡令賦以地與民制之上地食者參之一其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人賦役一體也役事之屬司空既經見則今地賦非他官事矣按此章與小司徒均土地章同其制數亦小司空之事也一事再見一出於司馬一出於司徒葢不其然今併於小司空之職論之小司徒之職曰乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦司空以是役民故因卒伍之法以用之故曰以起軍旅以作田役以比追胥以令貢賦賦起於役以定之故云又曰乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羨惟田與追胥竭作凡用衆庶則掌其政教與其戒禁聴其辭訟施其賞罰誅其犯命者凡國之大事致民大故致餘子皆役法也其大槩見於大司馬既取而歸之于大司空矣今小司空之事復雜于小司徒其因土地之上下而均其任人之數且曰凡起徒役毋過家一人又曰凡用衆庶則掌其政教與其戒禁夫鄉師之職既曰以考司空之辟以逆役事矣司冦又曰役諸司空由是觀之則此章其屬之司徒屬之司空學者當知所適從矣又曰乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事井邑丘甸之制葢所以任地事令貢賦也成周因井田以均地然後賦平而役均而井田則本諸鄉遂古匠人為溝洫亦始於九夫為井葢一事也今屬之小司徒非其職矣量地制邑此葢其制執度度地此葢其用井邑既正則任地事令貢賦可得而理矣又曰乃分地域而辨其守施其職而平其政此與上文相屬又曰凡建邦國立其社稷正其畿疆之封凡此皆邦之土事故盡當屬司空今載之小司徒者小司空之譌也區分而别之其有條矣雖不得其全然其大略可見亦足以見古者設官之意夫書得於煨燼之餘獨五官具而司空篇無一官存者固已無是理又況五官之屬各有羨者是何故也由其亡與羨參稽之又詳考其義證之於經庶乎聖經之舊可得而復見矣右司空官屬得於天官者十有一得於地官者二十有三得於春官者六得於夏官者九凡四十有九焉大司空雜出於地官者其凡可舉矣五官之屬又自有重複錯亂者略可槩見也雖然書亡既久傳信已深此議創起亦可駭且怪矣管窺蠡測何所逃譏姑記所見云爾若夫辨析釐正以為不刋之典使聖經明於昭代則有俟夫當世之大儒君子周禮復古編
